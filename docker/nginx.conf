server {
    # Honour Railway's $PORT env var; fall back to 80 for local builds.
    # Nginx does not expand shell variables in config files, so we use the
    # listen directive with a hard-coded default and rely on the startup
    # script to rewrite the port at runtime.
    listen ${PORT:-80};
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    # Increase upload size to match PHP settings
    client_max_body_size 64M;

    # Serve static assets directly; fall back to Laravel's front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass all PHP requests to PHP-FPM via Unix socket
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_read_timeout 300;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # Deny access to hidden files (e.g. .env, .git)
    location ~ /\. {
        deny all;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Logging
    access_log /dev/stdout;
    error_log  /dev/stderr warn;
}
