; PHP-FPM pool configuration for the Laravel application.
; This pool runs as the nginx user so that the Unix socket is accessible
; to Nginx without extra permission juggling.

[www]

user  = nginx
group = nginx

; Use a Unix socket instead of a TCP port — faster and no port conflicts.
listen = /var/run/php-fpm.sock
listen.owner = nginx
listen.group = nginx
listen.mode  = 0660

; Process manager — ondemand keeps memory usage low on Railway's free tier.
; Switch to "static" or "dynamic" for high-traffic workloads.
pm                   = ondemand
pm.max_children      = 10
pm.process_idle_timeout = 10s
pm.max_requests      = 500

; Redirect worker stdout/stderr to the main error log so Docker captures it.
catch_workers_output = yes
decorate_workers_output = no

; Increase limits to match typical Laravel workloads
php_admin_value[upload_max_filesize] = 64M
php_admin_value[post_max_size]       = 64M
php_admin_value[memory_limit]        = 256M
php_admin_value[max_execution_time]  = 300
